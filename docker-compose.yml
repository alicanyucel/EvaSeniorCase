version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: evacase-sqlserver
    environment:
      SA_PASSWORD: "Eva@Exchange2024!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Eva@Exchange2024!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evacase-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__SqlServer: "Server=sqlserver,1433;Database=EvaCaseDb;User Id=sa;Password=Eva@Exchange2024!;Encrypt=True;Trust Server Certificate=True;"
      Jwt__Issuer: "Me"
      Jwt__Audience: "My Projects"
      Jwt__SecretKey: "my secret key my secret key my secret key my secret key my secret key my secret key... my secret key my secret key my secret key my secret key my secret key my secret key..."
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver_data:
